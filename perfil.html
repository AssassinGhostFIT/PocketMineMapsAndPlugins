<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="stylesheet" href="assets/css/perfil.css">
</head>
<body>
  <!-- CONTENEDOR DEL PERFIL -->
  <div class="profile-container">
    
    <header class="cover">
      <img src="assets/img/portada.jpg" alt="Portada" class="cover-img">

      <!-- Foto de perfil -->
      <div class="profile-pic">
        <img src="assets/img/perfil.jpg" alt="Foto de perfil">
      </div>
    </header>

    <!-- Información principal -->
    <section class="profile-info">
      <h2 class="name">
        Nombre de Usuario 
        <button class="follow-btn">+ Seguir</button>
      </h2>
      
      <div class="status">
        <span class="status-badge online">🟣 En línea</span>
      </div>

      <!-- Stats acomodados -->
      <div class="stats-grid">
        <div><b>Seguidores:</b> 8210</div>
        <div><b>Siguiendo:</b> 205</div>
        <div><b>Nivel:</b> Lv.6</div>
        <div><b>Género:</b> Femenino</div>
        <div><b>País:</b> 🇵🇦 Panamá</div>
      </div>
    </section>

    <!-- Secciones en tarjetas -->
    <section class="sections">
      <div class="section-card" data-section="productos">🛍️ Mis Productos</div>
      <div class="section-card" data-section="insignia">🏅 Insignia</div>
      <div class="section-card" data-section="fama">👑 Salón de la Fama</div>
      <div class="section-card" data-section="mochila">🎒 Mochila</div>
    </section>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="assets/js/perfil.js"></script>
</body>
</html>
