<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="stylesheet" href="assets/css/perfil.css">
</head>
<body>
  <header class="cover">
    <img src="assets/img/portada.jpg" alt="Portada" class="cover-img">

    <!-- Foto de perfil -->
    <div class="profile-pic">
      <img src="assets/img/perfil.jpg" alt="Foto de perfil">
    </div>
  </header>

  <!-- Información principal -->
  <section class="profile-info">
    <h2 class="name">Nombre de Usuario <button class="follow-btn">+ Seguir</button></h2>
    
    <div class="status">
      <span class="status-badge online">🟣 En línea</span>
    </div>

    <div class="stats">
      <p><b>Seguidores:</b> 8210</p>
      <p><b>Siguiendo:</b> 205</p>
      <p><b>Nivel:</b> Lv.6</p>
      <p><b>País:</b> 🇵🇦 Panamá</p>
      <p><b>Género:</b> Femenino</p>
    </div>
  </section>

  <!-- Secciones -->
  <section class="sections">
    <div class="section-card" data-section="productos">🛍️ Mis Productos</div>
    <div class="section-card" data-section="insignia">🏅 Insignia</div>
    <div class="section-card" data-section="fama">👑 Salón de la Fama</div>
    <div class="section-card" data-section="mochila">🎒 Mochila</div>
  </section>

  <!-- Modal (para abrir contenido dinámico) -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <div id="modal-body">
        <!-- Aquí JS insertará el contenido -->
      </div>
    </div>
  </div>

  <script src="assets/js/perfil.js"></script>
</body>
</html>
