<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="stylesheet" href="assets/css/perfil.css">
</head>
<body>
  <header class="cover">
    <img src="img/portada.jpg" alt="Portada" class="cover-img">

    <!-- Foto de perfil -->
    <div class="profile-pic">
      <img src="img/perfil.jpg" alt="Foto de perfil">
    </div>
  </header>

  <!-- Info de Usuario -->
  <section class="profile-info">
    <div class="top-info">
      <h2 class="name">Nombre de Usuario</h2>
      <button class="follow-btn">+ Seguir</button>
    </div>

    <p class="status online">En línea</p>

    <div class="sub-info">
      <span>🌍 Panamá</span>
      <span>⚧ Masculino</span>
      <span>⭐ Lv.6</span>
    </div>

    <div class="stats">
      <p><strong>205</strong><br>Siguiendo</p>
      <p><strong>8210</strong><br>Seguidores</p>
    </div>
  </section>

  <!-- Espacio de CP -->
  <section class="card purple">
    <h3>Espacio de CP</h3>
    <p>No vinculado con CP</p>
    <div class="product-box">Aquí irán tus productos ⭐</div>
  </section>

  <!-- Insignia -->
  <section class="card gold">
    <h3>Insignia</h3>
    <div class="badge">🏅</div>
  </section>

  <!-- Salón de la Fama -->
  <section class="card red">
    <h3>Salón de la Fama</h3>
    <p>🔥 Top vendedores del mes</p>
    <ul class="ranking">
      <li>🥇 Vendedor 1</li>
      <li>🥈 Vendedor 2</li>
      <li>🥉 Vendedor 3</li>
    </ul>
  </section>

  <!-- Mochila (bordes comprados) -->
  <section class="card pink">
    <h3>🎁 Mochila</h3>
    <div class="mochila">
      <div class="item">Borde 1</div>
      <div class="item">Borde 2</div>
      <div class="item">Borde 3</div>
    </div>
  </section>

  <script src="assets/js/perfil.js"></script>
</body>
</html>
