<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PocketMine Maps & Plugins</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Fondo -->
  <canvas id="stars"></canvas>
  <div id="nebula"></div>

  <!-- Barra superior -->
  <header>
    <h1>PocketMine Maps & Plugins</h1>
    <div class="search-bar">
      <input type="text" placeholder="Buscar...">
    </div>
  </header>

  <!-- Menú -->
  <nav>
    <button>Inicio</button>
    <button>Plugins</button>
    <button>Maps</button>
    <button>Sells</button>
    <button>Chat</button>
    <button>Perfil</button>
  </nav>

  <!-- Slider Promociones -->
  <section class="slider">
    <div class="slides">
      <img src="img/promo1.jpg" alt="Promo 1">
      <img src="img/promo2.jpg" alt="Promo 2">
      <img src="img/promo3.jpg" alt="Promo 3">
      <img src="img/promo4.jpg" alt="Promo 4">
      <img src="img/promo5.jpg" alt="Promo 5">
    </div>
  </section>

  <!-- Categorías -->
  <section class="categorias">
    <button>Todos</button>
    <button>Plugins</button>
    <button>Maps</button>
  </section>

  <!-- Productos -->
  <section class="productos">
    <div class="card">
      <h3>SkyWars Map Pack</h3>
      <p>Paquete profesional de mapas SkyWars</p>
      <span class="price">$15.99</span>
    </div>
    <div class="card">
      <h3>Economy Plugin Pro</h3>
      <p>Sistema económico avanzado con shops y auctions</p>
      <span class="price">$24.99</span>
    </div>
    <div class="card">
      <h3>PvP Arena Bundle</h3>
      <p>Paquete con 10 arenas PvP únicas</p>
      <span class="price">$19.99</span>
    </div>
    <div class="card">
      <h3>Custom Enchants Plugin</h3>
      <p>50+ encantamientos personalizados</p>
      <span class="price">$12.99</span>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
