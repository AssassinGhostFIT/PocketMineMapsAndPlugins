<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PocketMine Maps and Plugins</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Fondo animado -->
  <canvas id="stars"></canvas>
  <div id="nebula"></div>

  <!-- Barra superior -->
  <header>
    <h1 id="title">PocketMine Maps and Plugins</h1>
    <input type="text" id="search" placeholder="Buscar...">
  </header>

  <!-- Carrusel -->
  <section class="slider">
    <div class="slides">
      <img src="img/slide1.jpg" alt="Promo 1">
      <img src="img/slide2.jpg" alt="Promo 2">
      <img src="img/slide3.jpg" alt="Promo 3">
      <img src="img/slide4.jpg" alt="Promo 4">
      <img src="img/slide5.jpg" alt="Promo 5">
    </div>
  </section>

  <!-- Categorías -->
  <nav class="categories">
    <button data-cat="all">Todos</button>
    <button data-cat="plugins">Plugins</button>
    <button data-cat="maps">Maps</button>
  </nav>

  <!-- Productos -->
  <main id="products">
    <div class="product neon">Producto 1</div>
    <div class="product neon">Producto 2</div>
    <div class="product neon">Producto 3</div>
    <div class="product neon">Producto 4</div>
  </main>

  <!-- Barra inferior -->
  <footer class="navbar">
    <button id="btn-home">🏠 Inicio</button>
    <button id="btn-servers">🖥 Servers</button>
    <button id="btn-sells">💰 Sells</button>
    <button id="btn-chat">💬 Chat</button>
    <button id="btn-profile">👤 Perfil</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
