<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PocketMine Maps & Plugins</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <!-- Fondo cósmico -->
  <canvas id="stars"></canvas>
  <div id="nebula"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <h1 class="logo">
        <span>PocketMine</span> <span class="amp">&</span> <span>Maps</span> <span>Plugins</span>
      </h1>
      <input id="search" type="search" placeholder="Buscar plugins, mapas, packs..." />
    </div>
  </header>

  <main>
    <!-- SLIDER PROMOS -->
    <section class="slider">
      <button class="nav prev" aria-label="Anterior">&#10094;</button>
      <div class="slides">
        <img src="https://picsum.photos/seed/pm1/1200/400" alt="Promo 1">
        <img src="https://picsum.photos/seed/pm2/1200/400" alt="Promo 2">
        <img src="https://picsum.photos/seed/pm3/1200/400" alt="Promo 3">
        <img src="https://picsum.photos/seed/pm4/1200/400" alt="Promo 4">
        <img src="https://picsum.photos/seed/pm5/1200/400" alt="Promo 5">
      </div>
      <button class="nav next" aria-label="Siguiente">&#10095;</button>
      <div class="dots"></div>
    </section>

    <!-- CATEGORÍAS -->
    <section class="categories">
      <button class="chip active" data-cat="all">Todos</button>
      <button class="chip" data-cat="plugin">Plugins</button>
      <button class="chip" data-cat="map">Maps</button>
    </section>

    <!-- GRID DE PRODUCTOS (2 por fila) -->
    <section id="products" class="grid"></section>
  </main>

  <!-- Bottom Navigation estilo Android -->
  <nav class="bottom-nav">
    <button class="tab active" data-tab="inicio" onclick="navigate('inicio')" title="Inicio">
      <!-- Home Icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z"/></svg>
      <span>Inicio</span>
    </button>
    <button class="tab" data-tab="servers" onclick="navigate('servers')" title="Servers">
      <!-- Server Icon -->
      <svg viewBox="0 0 24 24"><path d="M4 6h16v4H4V6zm0 8h16v4H4v-4zm2-6h2v2H6V8zm0 8h2v2H6v-2zM10 8h8v2h-8V8zm0 8h8v2h-8v-2z"/></svg>
      <span>Servers</span>
    </button>
    <button class="tab" data-tab="sells" onclick="navigate('sells')" title="Sells">
      <!-- Shop Icon -->
      <svg viewBox="0 0 24 24"><path d="M3 6h18l-1 4H4L3 6zm2 6h14l-1.5 8h-11L5 12zM8 2h8v2H8V2z"/></svg>
      <span>Sells</span>
    </button>
    <button class="tab" data-tab="chat" onclick="navigate('chat')" title="Chat">
      <!-- Chat Icon -->
      <svg viewBox="0 0 24 24"><path d="M2 4h20v12H6l-4 4V4z"/></svg>
      <span>Chat</span>
    </button>
    <button class="tab" data-tab="perfil" onclick="navigate('perfil')" title="Perfil">
      <!-- User Icon -->
      <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/></svg>
      <span>Perfil</span>
    </button>
  </nav>

  <script src="js/script.js"></script>
</body>
</html>
